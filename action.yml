name: gha-pytest
description: |-
  GitHub Action to run pytest, generating test summary and coverage report

author: albr21
branding:
  icon: check-circle
  color: green

inputs:
  path:
    description: Path to the Python code to test
    required: false
    default: src
  cov-threshold:
    description: Minimum coverage percentage required to pass
    required: false
    default: '80'
  command-line-interpreter:
    description: |-
      Command line interpreter.
      By default, it uses `bash`, but you can change it to `sh`.
    required: false
    default: bash

runs:
  using: composite
  steps:
    - name: Run pytest
      run: |-
        venv/bin/python -m pytest \
          --cov=${{ inputs.path }} \
          --cov-report=term-missing \
          --cov-report=xml:coverage.xml \
          --cov-fail-under=${{ inputs.cov-threshold }} \
          --junitxml=junit.xml \
          -v
      shell: ${{ inputs.command-line-interpreter }}

    - name: Test results summary
      if: always()
      run: |-
        if [ ! -f junit.xml ]; then
          echo "## :rotating_light: Test report not generated" >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        read tests failures errors skipped <<<$(python3 -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('junit.xml')
        root = tree.getroot()
        if root.tag == 'testsuites':
            node = root.find('testsuite') or root
        else:
            node = root
        tests = int(node.attrib.get('tests', 0))
        failures = int(node.attrib.get('failures', 0))
        errors = int(node.attrib.get('errors', 0))
        skipped = int(node.attrib.get('skipped', 0))
        print(tests, failures, errors, skipped)
        ")

        if [ "$failures" -eq 0 ] && [ "$errors" -eq 0 ]; then
          icon=":white_check_mark:"
        else
          icon=":x:"
        fi

        passed=$((tests - failures - errors - skipped))

        echo "## :clipboard: Test Results: ${icon}" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"

        echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
        echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
        echo "| :white_check_mark: Passed | $passed |" >> "$GITHUB_STEP_SUMMARY"
        echo "| :x: Failures | $failures |" >> "$GITHUB_STEP_SUMMARY"
        echo "| :x: Errors | $errors |" >> "$GITHUB_STEP_SUMMARY"
        echo "| :large_blue_circle: Skipped | $skipped |" >> "$GITHUB_STEP_SUMMARY"
        echo "| **Total** | **$tests** |" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
      shell: ${{ inputs.command-line-interpreter }}

    - name: Coverage report summary
      if: always()
      run: |-
        if [ ! -f coverage.xml ]; then
          echo "## :rotating_light: Coverage report not generated" >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        line_rate=$(python3 -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('coverage.xml')
        rate = float(tree.getroot().attrib['line-rate']) * 100
        print(f'{rate:.1f}')
        ")

        threshold=${{ inputs.cov-threshold }}
        if [ "$(python3 -c "print('1' if ${line_rate} >= ${threshold} else '0')")" = "1" ]; then
          icon=":white_check_mark:"
        else
          icon=":x:"
        fi

        echo "## :test_tube: Coverage Report: ${icon}" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"

        echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
        echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
        echo "| Overall coverage | **${line_rate}%** |" >> "$GITHUB_STEP_SUMMARY"
        echo "| Threshold | ${threshold}% |" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"

        echo "<details><summary>Coverage per file</summary>" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "| File | Coverage |" >> "$GITHUB_STEP_SUMMARY"
        echo "|------|----------|" >> "$GITHUB_STEP_SUMMARY"
        python3 -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('coverage.xml')
        for cls in tree.findall('.//class'):
            name = cls.attrib['filename']
            rate = float(cls.attrib['line-rate']) * 100
            icon = ':white_check_mark:' if rate >= $threshold else ':x:'
            print(f'| \`{name}\` | {icon} {rate:.1f}% |')
        " >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "</details>" >> "$GITHUB_STEP_SUMMARY"
      shell: ${{ inputs.command-line-interpreter }}
